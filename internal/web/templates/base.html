{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}llm-wiki{{end}}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#f8f9fa;color:#212529;line-height:1.6}
    header{background:#343a40;color:#fff;padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem}
    header a{color:#adb5bd;text-decoration:none;font-size:.9rem}
    header a:hover{color:#fff}
    header .brand{font-weight:700;font-size:1.1rem;color:#fff;text-decoration:none}
    .search-bar{margin-left:auto;display:flex;gap:.5rem}
    .search-bar input{padding:.35rem .75rem;border:none;border-radius:4px;font-size:.9rem;width:220px}
    .search-bar button{padding:.35rem .75rem;background:#0d6efd;color:#fff;border:none;border-radius:4px;cursor:pointer}
    main{max-width:900px;margin:2rem auto;padding:0 1rem}
    h1{font-size:1.6rem;margin-bottom:1rem}
    h2{font-size:1.2rem;margin:1.5rem 0 .5rem}
    a{color:#0d6efd}
    .card{background:#fff;border:1px solid #dee2e6;border-radius:6px;padding:1rem 1.25rem;margin-bottom:.75rem}
    .tag{display:inline-block;background:#e9ecef;border-radius:3px;padding:.1rem .45rem;font-size:.78rem;margin-right:.3rem}
    .snippet{color:#6c757d;font-size:.88rem;margin-top:.35rem}
    .page-content{background:#fff;border:1px solid #dee2e6;border-radius:6px;padding:1.5rem;white-space:pre-wrap;font-size:.95rem;line-height:1.7}
    .breadcrumb{font-size:.85rem;color:#6c757d;margin-bottom:.75rem}
    .breadcrumb a{color:#6c757d}
    .no-results{color:#6c757d;font-style:italic}
  </style>
</head>
<body>
<header>
  <a class="brand" href="/">llm-wiki</a>
  <a href="/">Browse</a>
  <a href="/search">Search</a>
  <form class="search-bar" action="/search" method="get">
    <input name="q" placeholder="Search pages…" value="{{block "searchval" .}}{{end}}">
    <button type="submit">Go</button>
  </form>
</header>
<main>
{{block "content" .}}{{end}}
</main>
</body>
</html>{{end}}
